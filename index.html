<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cromos que me faltan · Panini WC 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1729;
    --surface: #1A2340;
    --surface-hover: #232E52;
    --border: #2D3654;
    --text: #E8EEF7;
    --muted: #8A96B2;
    --gold: #FFB800;
    --green: #00C853;
    --red: #FF3D71;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    background-image:
      radial-gradient(ellipse at top, rgba(255, 184, 0, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at bottom, rgba(0, 200, 83, 0.04) 0%, transparent 50%);
  }

  .container { max-width: 1100px; margin: 0 auto; }

  header {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .header-content { flex: 1; min-width: 0; }

  .ball {
    width: 140px; height: 140px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.5))
            drop-shadow(0 0 30px rgba(255, 184, 0, 0.15));
    animation: floatBall 7s ease-in-out infinite;
  }

  @keyframes floatBall {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50%      { transform: translateY(-10px) rotate(6deg); }
  }

  @media (max-width: 640px) {
    header { flex-direction: column-reverse; align-items: flex-start; gap: 16px; }
    .ball { width: 90px; height: 90px; align-self: center; margin-bottom: -8px; }
  }

  .eyebrow {
    color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 20px;
  }

  h1 .accent { color: var(--gold); }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 16px;
    font-style: italic;
  }

  .progress-wrap { display: flex; flex-direction: column; gap: 8px; }

  .progress-track {
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, #7BC454 100%);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .progress-labels .obtained { color: var(--green); font-weight: 700; }
  .progress-labels .total { color: var(--muted); }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }

  .filter-btn:hover {
    background: var(--surface-hover);
    border-color: var(--muted);
  }

  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  .filter-btn .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: 0.75;
  }

  .search {
    flex: 1; min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-family: inherit;
  }

  .search:focus { outline: none; border-color: var(--gold); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    position: relative;
    transition: opacity 0.2s;
  }

  .team-card.all-done { opacity: 0.45; }

  .team-card.all-done::after {
    content: '✓ COMPLETO';
    position: absolute;
    top: 14px; right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--green);
    font-weight: 700;
    letter-spacing: 0.15em;
  }

  .team-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    gap: 10px;
    padding: 0 4px;
  }

  .team-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .team-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .stickers-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .sticker-item {
    display: flex; align-items: center;
    gap: 10px;
    background: transparent;
    border: none;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    width: 100%;
  }

  .sticker-item:hover { background: var(--surface-hover); }

  .sticker-num {
    min-width: 34px; height: 26px;
    padding: 0 6px;
    border-radius: 5px;
    border: 1.5px dashed var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 11px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .sticker-player {
    font-size: 13px;
    flex: 1; min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }

  .sticker-item.obtained .sticker-num {
    background: var(--green);
    border: 1.5px solid var(--green);
    color: #000;
  }

  .sticker-item.obtained .sticker-player {
    text-decoration: line-through;
    color: var(--muted);
  }

  .special-card {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(255, 184, 0, 0.06), rgba(0, 200, 83, 0.03));
    border: 1px solid rgba(255, 184, 0, 0.35);
  }

  .special-card .team-name { color: var(--gold); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .footer-actions {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .action-btn:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  .action-btn.danger:hover {
    color: var(--red);
    border-color: var(--red);
  }
</style>
</head>

      { name: 'Corea', missing: [{n:15,player:'Jens Castrop'}] },
      { name: 'Rep. Checa', missing: [{n:3,player:'Jindrich Stanek'}] },
      { name: 'Qatar', missing: [{n:1,player:'Team Logo'}] },
      { name: 'Haití', missing: [{n:16,player:'Josue Casimir'}] },
      { name: 'Escocia', missing: [{n:10,player:'Grant Hanley'}] },
      { name: 'USA', missing: [{n:17,player:'Brenden Aaronson'}] },
      { name: 'Australia', missing: [{n:17,player:'Craig Goodwin'}] },
      { name: 'Turquía', missing: [{n:10,player:'Ismail Yuksek'},{n:17,player:'Can Uzun'}] },
      { name: 'Alemania', missing: [{n:10,player:'Joshua Kimmich'}] },
      { name: 'Costa de Marfil', missing: [{n:14,player:'Jean-Philippe Gbamin'}] },
      { name: 'Ecuador', missing: [{n:19,player:'Kevin Rodriguez'}] },
      { name: 'Holanda', missing: [{n:1,player:'Team Logo'}] },
      { name: 'Suecia', missing: [{n:6,player:'Victor Nilsson Lindelöf'},{n:10,player:'Jesper Karlström'}] },
      { name: 'Irán', missing: [{n:3,player:'Morteza Pouraliganji'},{n:13,player:'Team Photo'}] },
      { name: 'N. Zelanda', missing: [{n:4,player:'Michael Boxall'}] },
      { name: 'España', missing: [{n:19,player:'Álvaro Morata'}] },
      { name: 'Uruguay', missing: [{n:10,player:'Federico Valverde'}] },
      { name: 'Iraq', missing: [{n:2,player:'Jalal Hassan'}] },
      { name: 'Argentina', missing: [{n:2,player:'Emiliano Martinez'},{n:13,player:'Team Photo'},{n:14,player:'Nico Paz'},{n:17,player:'Lionel Messi'}] },
      { name: 'Argelia', missing: [{n:8,player:'Ismael Bennacer'}] },
      { name: 'Congo', missing: [{n:5,player:'Arthur Masuaku'}] },
      { name: 'Inglaterra', missing: [{n:3,player:'John Stones'}] },
      { name: 'Croacia', missing: [{n:3,player:'Duje Caleta-Car'},{n:9,player:'Luka Modrić'}] },
    ]
  };

  let obtainedSet = new Set();
  let currentFilter = 'all';
  let searchTerm = '';

  const STORAGE_KEY = 'panini-wc-2026-obtained';

  const DEFAULT_OBTAINED = [];

  const storage = {
    async get(key) {
      if (typeof window.storage !== 'undefined' && window.storage) {
        try { return await window.storage.get(key); } catch (e) { return null; }
      }
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v };
    },
    async set(key, value) {
      if (typeof window.storage !== 'undefined' && window.storage) {
        try { return await window.storage.set(key, value); } catch (e) {}
      }
      localStorage.setItem(key, value);
    }
  };

  async function loadState() {
    try {
      const result = await storage.get(STORAGE_KEY);
      if (result && result.value) {
        obtainedSet = new Set(JSON.parse(result.value));
      } else {
        obtainedSet = new Set(DEFAULT_OBTAINED);
      }
    } catch (e) { obtainedSet = new Set(DEFAULT_OBTAINED); }

    // Podar IDs huérfanos que ya no existen en los datos (para limpiar localStorage viejo)
    const validIds = new Set(getAllStickers().map(s => s.id));
    const pruned = new Set([...obtainedSet].filter(id => validIds.has(id)));
    if (pruned.size !== obtainedSet.size) {
      obtainedSet = pruned;
      await saveState();
    }
  }

  async function saveState() {
    try { await storage.set(STORAGE_KEY, JSON.stringify([...obtainedSet])); }
    catch (e) { console.error('Save failed:', e); }
  }

  function buildTeamStickers(team) {
    return team.missing.map(s => ({
      id: `team-${team.name}-${s.n}`,
      num: String(s.n),
      player: s.player
    }));
  }

  function getAllStickers() {
    const all = [];
    data.specials.forEach(g => g.stickers.forEach(s => all.push(s)));
    data.teams.forEach(t => buildTeamStickers(t).forEach(s => all.push(s)));
    return all;
  }

  function updateCounts() {
    const all = getAllStickers();
    const total = all.length;
    const obtained = all.filter(s => obtainedSet.has(s.id)).length;
    const pending = total - obtained;

    document.getElementById('obtainedCount').textContent = obtained;
    document.getElementById('totalCount').textContent = pending;
    document.getElementById('progressFill').style.width = total > 0 ? (obtained / total * 100) + '%' : '0%';

    document.getElementById('countAll').textContent = total;
    document.getElementById('countPending').textContent = pending;
  }

  function matchesSearch(name, stickers) {
    if (!searchTerm) return true;
    const q = searchTerm.toLowerCase();
    if (name.toLowerCase().includes(q)) return true;
    return stickers.some(s => (s.player || '').toLowerCase().includes(q));
  }

  function shouldShowCard(name, stickerList) {
    if (!matchesSearch(name, stickerList)) return false;
    if (currentFilter === 'pending') return stickerList.some(s => !obtainedSet.has(s.id));
    return true;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderCard(name, stickers, isSpecial) {
    const card = document.createElement('div');
    card.className = 'team-card' + (isSpecial ? ' special-card' : '');
    const allDone = stickers.every(s => obtainedSet.has(s.id));
    if (allDone) card.classList.add('all-done');
    const obtained = stickers.filter(s => obtainedSet.has(s.id)).length;

    card.innerHTML = `
      <div class="team-header">
        <div class="team-name">${escapeHtml(name)}</div>
        <div class="team-count">${obtained}/${stickers.length}</div>
      </div>
      <div class="stickers-list">
        ${stickers.map(s => {
          const classes = ['sticker-item'];
          if (obtainedSet.has(s.id)) classes.push('obtained');
          return `<button class="${classes.join(' ')}" data-id="${escapeHtml(s.id)}">
            <span class="sticker-num">${escapeHtml(s.num)}</span>
            <span class="sticker-player">${escapeHtml(s.player)}</span>
          </button>`;
        }).join('')}
      </div>
    `;
    return card;
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    let visibleCount = 0;

    data.specials.forEach(group => {
      if (!shouldShowCard(group.name, group.stickers)) return;
      visibleCount++;
      grid.appendChild(renderCard(group.name, group.stickers, true));
    });

    data.teams.forEach(team => {
      const stickers = buildTeamStickers(team);
      if (!shouldShowCard(team.name, stickers)) return;
      visibleCount++;
      grid.appendChild(renderCard(team.name, stickers, false));
    });

    document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';

    document.querySelectorAll('.sticker-item').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        if (obtainedSet.has(id)) obtainedSet.delete(id);
        else obtainedSet.add(id);
        await saveState();
        updateCounts();
        render();
      });
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    render();
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    if (confirm('¿Seguro que quieres resetear todo el progreso?')) {
      obtainedSet.clear();
      await saveState();
      updateCounts();
      render();
    }
  });

  document.getElementById('exportBackupBtn').addEventListener('click', () => {
    const payload = {
      version: 1,
      album: 'panini-wc-2026',
      exported_at: new Date().toISOString(),
      obtained: [...obtainedSet]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `cromos-panini-wc-2026-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  document.getElementById('importBackupBtn').addEventListener('click', () => {
    document.getElementById('importFileInput').click();
  });
  document.getElementById('importFileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    try {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload || !Array.isArray(payload.obtained)) throw new Error('Formato inválido');
      const count = payload.obtained.length;
      if (!confirm(`Cargar ${count} cromos conseguidos? Esto reemplazará tu progreso actual.`)) return;
      obtainedSet = new Set(payload.obtained);
      await saveState();
      updateCounts();
      render();
    } catch (err) {
      alert('No se pudo cargar el backup: ' + err.message);
    }
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const lines = ['CROMOS POR CAZAR · Panini WC 2026', ''];
    data.specials.forEach(group => {
      const pending = group.stickers.filter(s => !obtainedSet.has(s.id));
      if (pending.length > 0) {
        lines.push(`${group.name}:`);
        pending.forEach(s => lines.push(`  ${s.num} · ${s.player}`));
        lines.push('');
      }
    });
    data.teams.forEach(team => {
      const stickers = buildTeamStickers(team);
      const pending = stickers.filter(s => !obtainedSet.has(s.id));
      if (pending.length > 0) {
        lines.push(`${team.name}:`);
        pending.forEach(s => lines.push(`  ${s.num} · ${s.player}`));
        lines.push('');
      }
    });
    const text = lines.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('exportBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado al portapapeles';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  });

  (async () => {
    await loadState();
    updateCounts();
    render();
  })();
</script>
</body>
</html>
